databases:
  - name: reentry-legal-ai-db
    databaseName: reentry
    user: reentry
    plan: basic-256mb

services:
  - type: web
    name: reentry-legal-ai
    runtime: node
    plan: starter
    repo: https://github.com/paisabrazilfl-cpu/reentry-legal-ai
    branch: clerk-auth-per-user-2026-06-05
    autoDeploy: true
    buildCommand: |
      export PORT=8080 && export BASE_PATH=/ && npx pnpm@10 install --frozen-lockfile && npx pnpm@10 --filter @workspace/web run build && npx pnpm@10 --filter @workspace/api-server run build && rm -rf artifacts/api-server/dist/public && cp -r artifacts/web/dist/public artifacts/api-server/dist/public
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: PORT
        value: 8080
      - key: BASE_PATH
        value: /
      - key: NODE_ENV
        value: production
      - key: AI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: reentry-legal-ai-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
